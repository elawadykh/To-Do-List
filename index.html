<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة المهام - To Do List</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-container" class="auth-card">
    <h2 id="auth-title">تسجيل الدخول</h2>
    
    <form id="auth-form">
        <div class="input-group">
        <label for="auth-email">البريد الإلكتروني</label>
        <input type="email" id="auth-email" required placeholder="example@mail.com">
        </div>
        
        <div class="input-group">
        <label for="auth-password">كلمة المرور</label>
        <input type="password" id="auth-password" required placeholder="******">
        </div>
        
    <button type="submit" id="auth-submit-btn">دخول</button>

    <div class="divider">أو</div>
    <button type="button" id="google-btn" class="google-btn">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Google_Favicon_2025.svg" alt="Google Logo" width="18">
    الدخول بواسطة حساب Google
    </button>
</form>
    
    <p class="auth-toggle">
        معندكش حساب؟ <span id="toggle-auth-mode">إنشاء حساب جديد</span>
    </p>
    </div>

    <div id="todo-container" class="todo-container hidden">
        <div class="header-container">
            <h2>قائمة مهامي 🚀</h2>
            <button id="ai-settings-toggle-btn" class="icon-btn" title="إعدادات الذكاء الاصطناعي">🤖⚙️</button>
        </div>

        <!-- لوحة إعدادات الذكاء الاصطناعي -->
        <div id="ai-settings-panel" class="settings-panel hidden">
            <div class="settings-group">
                <label for="gemini-api-key" class="settings-label">مفتاح API الخاص بك:</label>
                <div class="api-key-input-container">
                    <input type="password" id="gemini-api-key" placeholder="أدخل مفتاح Gemini API">
                </div>
            </div>
            <button id="save-api-key-btn" style="margin-top: 8px; width: 100%; padding: 8px; background-color: #4caf50; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">حفظ الإعدادات</button>
            <p class="settings-help">يمكنك الحصول على مفتاح مجاني من <a href="https://aistudio.google.com/" target="_blank">Google AI Studio</a></p>
        </div>
        
        <div class="input-section">
            <input type="text" id="todo-input" placeholder="اكتب مهمة جديدة هنا...">
            <button id="add-btn">إضافة</button>
        </div>
        <div class="options-section">
            <label class="checkbox-label">
                <input type="checkbox" id="todo-recurring">
                <span>مهمة متكررة 🔄</span>
            </label>
        </div>


        <ul id="todo-list">
            </ul>
        <button id="logout-btn" class="logout-btn">تسجيل الخروج</button>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
